<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nyelle Social</title>
    <style>
        /* =========================================
           BASE RESET & VARIABLES
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }

        :root {
            --bg-darker: #1e1f22; 
            --bg-dark: #2b2d31;   
            --bg-panel: #313338;  
            --accent: #5865F2;    
            --accent-shadow: #3b429f;
            --accent-highlight: #8ea1ff;
            --bubble-nyelle: #383a40;
            --bubble-nyelle-shadow: #1e1f22;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
            --success: #23a559;
        }

        body { background-color: var(--bg-darker); height: 100vh; display: flex; overflow: hidden; color: var(--text-main); }

        /* =========================================
           OVERLAYS (Login, Profile, Add Friend)
           ========================================= */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 999; 
        }
        .auth-box { background: var(--bg-dark); padding: 35px 25px; border-radius: 20px; border: 2px solid #111; box-shadow: 0px 10px 30px rgba(0,0,0,0.8); text-align: center; width: 90%; max-width: 400px; }
        .auth-box h2 { color: var(--text-main); margin-bottom: 5px; font-weight: 900; }
        .auth-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        
        .avatar-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .avatar-option, .custom-pfp-preview { width: 55px; height: 55px; font-size: 30px; cursor: pointer; padding: 10px; background: var(--bg-darker); border-radius: 50%; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; }
        .avatar-option.selected, .custom-pfp-preview.selected { border-color: var(--accent); background: var(--bg-panel); box-shadow: 0px 0px 15px rgba(88, 101, 242, 0.5); }
        .custom-pfp-preview { object-fit: cover; display: none; padding: 0; }

        .upload-btn { background: #1e1f22; border: 2px dashed #4f525a; color: var(--text-muted); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; display: inline-block; margin-bottom: 20px; }
        
        /* =========================================
           LAYOUT & NEW SOCIAL SIDEBAR
           ========================================= */
        .app-layout { display: flex; width: 100%; height: 100%; }
        .sidebar { display: none; width: 280px; background: var(--bg-dark); border-right: 4px solid var(--bg-darker); flex-direction: column; box-shadow: inset -4px 0px 0px rgba(0,0,0,0.2); }
        @media (min-width: 800px) { .sidebar { display: flex; } }
        
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--bg-darker); display: flex; align-items: center; gap: 15px; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px 10px; }
        
        .section-title { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 5px 10px; }
        
        /* Friend List Items */
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.1s; margin-bottom: 5px; }
        .friend-item:hover { background: var(--bg-panel); }
        .friend-item.active { background: var(--accent); color: white; }
        .friend-item .avatar-mini { width: 35px; height: 35px; background: var(--bg-darker); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border: 2px solid #111; overflow: hidden;}
        .friend-item .avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
        .friend-item .status-dot { width: 10px; height: 10px; background: var(--text-muted); border-radius: 50%; margin-left: auto; border: 2px solid var(--bg-dark); }
        .friend-item .status-dot.online { background: var(--success); }
        .friend-item.active .status-dot { border-color: var(--accent); }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); background-image: radial-gradient(var(--bg-darker) 1px, transparent 1px); background-size: 20px 20px; position: relative; }
        .mobile-header { display: flex; padding: 15px 20px; background: var(--bg-dark); border-bottom: 4px solid var(--bg-darker); align-items: center; gap: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.4); z-index: 10; }
        @media (min-width: 800px) { .mobile-header { display: none; } }

        /* =========================================
           CHAT BOX & BUBBLES
           ========================================= */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; align-items: center; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg-dark); }
        .chat-content { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 18px; }

        .msg-wrapper { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        @media (min-width: 800px) { .msg-wrapper { max-width: 70%; } }
        .msg-nyelle { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble-pfp { font-size: 20px; background: var(--bg-darker); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 2px solid #111; box-shadow: 0px 3px 5px rgba(0,0,0,0.3); overflow: hidden; flex-shrink: 0;}
        .bubble-pfp img { width: 100%; height: 100%; object-fit: cover; } 

        .toon-bubble { padding: 14px 18px; border-radius: 20px; font-weight: 600; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative;}
        .nyelle-msg { background: var(--bubble-nyelle); border: 2px solid var(--bubble-nyelle-shadow); border-bottom-left-radius: 4px; box-shadow: 0px 6px 0px var(--bubble-nyelle-shadow); }
        .user-msg { background: var(--accent); border: 2px solid var(--accent-shadow); border-bottom-right-radius: 4px; box-shadow: 0px 6px 0px var(--accent-shadow); }

        .read-receipt { font-size: 11px; color: rgba(255,255,255,0.5); position: absolute; bottom: -20px; right: 0; font-weight: bold;}
        .read-receipt.read { color: #4facfe; }

        /* =========================================
           INPUT AREA
           ========================================= */
        .input-wrapper { padding: 15px 20px 25px 20px; background: linear-gradient(0deg, var(--bg-darker) 0%, transparent 100%); display: flex; justify-content: center; }
        .input-container { width: 100%; max-width: 800px; display: flex; gap: 12px; }
        .toon-input { flex: 1; background: var(--bg-darker); border: 3px solid #111; border-radius: 18px; padding: 0 20px; color: white; font-size: 16px; font-weight: bold; outline: none; box-shadow: inset 0px 6px 10px rgba(0,0,0,0.5); }
        .toon-input:focus { border-color: var(--accent); }
        .toon-btn { background: var(--accent); color: white; border: 2px solid var(--accent-shadow); border-radius: 16px; padding: 10px 20px; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0px 6px 0px var(--accent-shadow); transition: 0.1s; }
        .toon-btn:active { transform: translateY(6px); box-shadow: 0px 0px 0px var(--accent-shadow); }

        /* Typing animation */
        .typing-dots { display: flex; gap: 4px; align-items: center; height: 20px; }
        .dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="auth-box">
            <h2>System Access</h2>
            <p>Enter your 10-character code.</p>
            <input type="text" id="access-code" class="toon-input" placeholder="e.g. A9X7B2P4MM" style="margin-bottom: 15px; padding: 15px; text-align: center; letter-spacing: 2px; text-transform: uppercase; width: 100%;">
            <button id="login-btn" class="toon-btn" style="width: 100%; padding: 15px;">AUTHENTICATE</button>
            <p id="login-error" style="color: #da373c; display: none; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="profile-overlay" class="overlay" style="display: none;">
        <div class="auth-box">
            <h2>Welcome, <span id="welcome-name" style="color: var(--accent);">User</span>!</h2>
            <p>Choose your avatar or upload a custom one.</p>
            <div class="avatar-picker">
                <div class="avatar-option selected" onclick="selectAvatar(this, '😎')">😎</div>
                <div class="avatar-option" onclick="selectAvatar(this, '👾')">👾</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</div>
                <img id="custom-preview" class="custom-pfp-preview" src="">
            </div>
            <label for="custom-pfp-upload" class="upload-btn">📷 Upload Picture</label>
            <input type="file" id="custom-pfp-upload" accept="image/*" style="display: none;">
            <button id="finish-setup-btn" class="toon-btn" style="width: 100%; padding: 15px;">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="add-friend-overlay" class="overlay" style="display: none;">
        <div class="auth-box">
            <h2>Add a Friend</h2>
            <p>Enter their 10-character network code to start a DM.</p>
            <input type="text" id="friend-code-input" class="toon-input" placeholder="e.g. FRIENDCODE1" style="margin-bottom: 15px; padding: 15px; text-align: center; letter-spacing: 1px; text-transform: uppercase; width: 100%;">
            <input type="text" id="friend-name-input" class="toon-input" placeholder="Nickname (e.g. Abhinav)" style="margin-bottom: 15px; padding: 15px; text-align: center; width: 100%;">
            <button id="start-dm-btn" class="toon-btn" style="width: 100%; padding: 15px; margin-bottom: 10px;">ADD TO NETWORK</button>
            <button onclick="document.getElementById('add-friend-overlay').style.display='none'" class="toon-btn" style="width: 100%; padding: 15px; background: #da373c; border-color: #a1282c; box-shadow: 0px 6px 0px #a1282c;">CANCEL</button>
        </div>
    </div>

    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar-ring" style="width: 45px; height: 45px; font-size: 18px;" id="my-sidebar-pfp">N</div>
                <div>
                    <h2 style="font-weight: 900; font-size: 16px;" id="my-sidebar-name">User</h2>
                    <p style="color: var(--success); font-weight: bold; font-size: 12px;">● Online</p>
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="section-title">AI Core</div>
                <div class="friend-item active" id="friend-NYELLE_CORE" onclick="switchChat('NYELLE_CORE')">
                    <div class="avatar-mini" style="background: var(--accent); color: white;">N</div>
                    <span style="font-weight: bold;">Nyelle</span>
                    <div class="status-dot online"></div>
                </div>

                <div class="section-title" style="margin-top: 20px;">Direct Messages</div>
                <div id="dm-list">
                    </div>

                <button onclick="document.getElementById('add-friend-overlay').style.display='flex'" class="toon-btn" style="width: 100%; margin-top: 20px; font-size: 13px; padding: 12px; background: #1e1f22; border-color: #111; box-shadow: 0px 4px 0px #111;">+ ADD FRIEND</button>
            </div>
        </aside>

        <main class="main-chat">
            <header class="mobile-header">
                <div class="avatar-ring" style="width: 40px; height: 40px; font-size: 18px;" id="mob-header-pfp">N</div>
                <div>
                    <h2 style="font-size: 18px; font-weight: 900;" id="mob-header-name">Nyelle</h2>
                    <p style="font-size: 12px; color: var(--success);">● Active Session</p>
                </div>
            </header>

            <div class="chat-container" id="chat-box">
                <div class="chat-content" id="chat-content">
                    </div>
            </div>

            <div class="input-wrapper">
                <div class="input-container">
                    <input type="text" id="user-input" class="toon-input" placeholder="Message Nyelle..." autocomplete="off">
                    <button id="send-btn" class="toon-btn">SEND</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-remote-config-compat.js"></script>

    <script>
        // ==========================================
        // STATE, FIREBASE & AUTHENTICATION
        // ==========================================
        let API_URL = ''; 
        let currentUserCode = localStorage.getItem('nyelle_user_code');
        let currentUserName = localStorage.getItem('nyelle_user_name');
        let currentUserPfp = localStorage.getItem('nyelle_user_pfp');
        
        let ws; // The real-time WebSocket connection
        let activeChat = 'NYELLE_CORE'; // Who we are currently talking to
        let chatHistories = { 'NYELLE_CORE': [] }; // Store message arrays locally for fast switching
        let friendsList = JSON.parse(localStorage.getItem('nyelle_friends')) || {}; // Store added friends
        
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCwwIWNcBIPmA_Iad_I07y3LD4e4M8TLxs",
            projectId: "zane-c0ce1", 
            appId: "1:466750964965:web:4f2ca5b67d2c55cd50c00c"
        };
        firebase.initializeApp(firebaseConfig);
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings.minimumFetchIntervalMillis = 0; 

        // --- BOOTLOADER ---
        async function initializeDynamicConnection() {
            try {
                await remoteConfig.fetchAndActivate();
                API_URL = remoteConfig.getString('nyelle_server_url');
                
                if (currentUserCode && currentUserName && currentUserPfp) {
                    document.getElementById('login-overlay').style.display = 'none';
                    startSystem();
                }
            } catch (err) {
                document.getElementById('login-error').textContent = "Failed to route. Check Firebase.";
                document.getElementById('login-error').style.display = 'block';
            }
        }
        initializeDynamicConnection();

        // Login UI
        document.getElementById('login-btn').addEventListener('click', async () => {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if (!code || !API_URL) return;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();

                if (data.success) {
                    currentUserCode = data.user_id; currentUserName = data.user.name;
                    localStorage.setItem('nyelle_user_code', currentUserCode);
                    localStorage.setItem('nyelle_user_name', currentUserName);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('welcome-name').textContent = currentUserName;
                    document.getElementById('profile-overlay').style.display = 'flex';
                } else {
                    document.getElementById('login-error').textContent = "Invalid Code.";
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (err) { alert("Backend unreachable."); }
        });

        // PFP UI
        let tempSelectedAvatar = '😎';
        function selectAvatar(element, emoji) {
            tempSelectedAvatar = emoji;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('custom-preview').classList.remove('selected');
            element.classList.add('selected');
        }
        document.getElementById('custom-pfp-upload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                tempSelectedAvatar = event.target.result;
                const cp = document.getElementById('custom-preview');
                cp.src = tempSelectedAvatar; cp.style.display = 'flex';
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                cp.classList.add('selected');
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('finish-setup-btn').addEventListener('click', () => {
            currentUserPfp = tempSelectedAvatar;
            localStorage.setItem('nyelle_user_pfp', currentUserPfp);
            document.getElementById('profile-overlay').style.display = 'none';
            startSystem();
        });

        // ==========================================
        // WEBSOCKET ENGINE (THE MULTIPLAYER HEART)
        // ==========================================
        function connectWebSocket() {
            const wsProtocol = API_URL.startsWith('https') ? 'wss://' : 'ws://';
            const wsDomain = API_URL.replace('https://', '').replace('http://', '');
            const wsUrl = `${wsProtocol}${wsDomain}/ws/${currentUserCode}`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => console.log("🟢 Live Socket Connected!");
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // --- INCOMING CHAT MESSAGE ---
                if (data.type === 'chat') {
                    removeTyping();
                    const isSelf = data.from_user === currentUserCode;
                    
                    // If we sent it, it stays in the active chat. If a friend sent it, it goes to their specific history array.
                    const targetHistory = isSelf ? activeChat : data.from_user; 
                    if (!chatHistories[targetHistory]) chatHistories[targetHistory] = [];
                    
                    // Generate a unique ID to attach the read receipt double ticks later
                    const msgId = Date.now(); 
                    
                    chatHistories[targetHistory].push({ id: msgId, text: data.text, isSelf: isSelf, read: false });

                    if (activeChat === targetHistory) {
                        addMessageToUI(data.text, isSelf, msgId, targetHistory);
                        
                        // If we are actively looking at this chat and they sent it, send a Read Receipt back!
                        if (!isSelf) {
                            ws.send(JSON.stringify({ type: "read", target_user: data.from_user }));
                        }
                    } else {
                        // Background message received! Show a notification dot (CSS class update)
                        const friendEl = document.getElementById(`friend-${targetHistory}`);
                        if(friendEl) friendEl.style.boxShadow = "inset 4px 0px 0px var(--success)";
                    }
                } 
                
                // --- INCOMING TYPING INDICATOR ---
                else if (data.type === 'typing') {
                    if (activeChat === data.from_user) {
                        showTyping(data.from_user);
                        clearTimeout(window.typingTimer);
                        window.typingTimer = setTimeout(removeTyping, 3000); // clear after 3s
                    }
                }

                // --- INCOMING READ RECEIPT (DOUBLE TICKS) ---
                else if (data.type === 'read_receipt') {
                    if (activeChat === data.from_user) {
                        // Turn the ticks blue!
                        document.querySelectorAll('.read-receipt').forEach(el => {
                            el.innerHTML = '✓✓';
                            el.classList.add('read');
                        });
                    }
                }
            };

            ws.onclose = () => {
                console.log("🔴 Socket Dropped. Reconnecting...");
                setTimeout(connectWebSocket, 3000);
            };
        }

        // ==========================================
        // UI & CHAT RENDERING LOGIC
        // ==========================================
        const chatContent = document.getElementById('chat-content');
        const inputField = document.getElementById('user-input');

        function scrollToBottom() { document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight; }

        function renderSidebarPfp(pfpData) {
            if (pfpData.startsWith('data:image')) return `<img src="${pfpData}">`;
            return pfpData;
        }

        function buildFriendList() {
            const dmList = document.getElementById('dm-list');
            dmList.innerHTML = '';
            for (const [code, info] of Object.entries(friendsList)) {
                dmList.innerHTML += `
                    <div class="friend-item" id="friend-${code}" onclick="switchChat('${code}')">
                        <div class="avatar-mini">${renderSidebarPfp(info.pfp)}</div>
                        <span style="font-weight: bold;">${info.name}</span>
                        <div class="status-dot online"></div>
                    </div>
                `;
            }
        }

        // Add Friend Logic
        document.getElementById('start-dm-btn').addEventListener('click', () => {
            const code = document.getElementById('friend-code-input').value.trim().toUpperCase();
            const name = document.getElementById('friend-name-input').value.trim();
            if (!code || !name) return;
            
            // In a real app we'd fetch their real PFP from the backend, using generic robot for now
            friendsList[code] = { name: name, pfp: '🤖' }; 
            localStorage.setItem('nyelle_friends', JSON.stringify(friendsList));
            
            buildFriendList();
            document.getElementById('add-friend-overlay').style.display = 'none';
            switchChat(code);
        });

        // Switching Active Chats
        function switchChat(targetCode) {
            activeChat = targetCode;
            chatContent.innerHTML = ''; // Clear board
            
            // Update sidebar highlights
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.remove('active');
                el.style.boxShadow = "none"; // Clear unread badge
            });
            document.getElementById(`friend-${targetCode}`).classList.add('active');

            // Update Headers
            const displayName = targetCode === 'NYELLE_CORE' ? 'Nyelle' : friendsList[targetCode].name;
            const displayPfp = targetCode === 'NYELLE_CORE' ? 'N' : renderSidebarPfp(friendsList[targetCode].pfp);
            document.getElementById('mob-header-name').textContent = displayName;
            document.getElementById('mob-header-pfp').innerHTML = displayPfp;
            inputField.placeholder = `Message ${displayName}...`;

            // Reload history for this specific chat
            if (chatHistories[activeChat]) {
                chatHistories[activeChat].forEach(msg => {
                    addMessageToUI(msg.text, msg.isSelf, msg.id, targetCode);
                });
            }
            scrollToBottom();
        }

        function addMessageToUI(text, isSelf, msgId, chatRoomCode) {
            const msgWrapper = document.createElement('div');
            msgWrapper.className = `msg-wrapper ${isSelf ? 'msg-user' : 'msg-nyelle'}`;
            
            const pfp = document.createElement('div');
            pfp.className = 'bubble-pfp';
            
            if (isSelf) {
                pfp.innerHTML = renderSidebarPfp(currentUserPfp);
            } else {
                pfp.innerHTML = chatRoomCode === 'NYELLE_CORE' ? 'N' : renderSidebarPfp(friendsList[chatRoomCode]?.pfp || '🤖');
            }
            
            const bubble = document.createElement('div');
            bubble.className = `toon-bubble ${isSelf ? 'user-msg' : 'nyelle-msg'}`;
            bubble.innerHTML = `<p>${text}</p>`;

            // Add the WhatsApp double tick if it's our message!
            if (isSelf) {
                bubble.innerHTML += `<span class="read-receipt" id="receipt-${msgId}">✓</span>`;
            }
            
            msgWrapper.appendChild(pfp);
            msgWrapper.appendChild(bubble);
            chatContent.appendChild(msgWrapper);
            scrollToBottom();
        }

        function showTyping(senderCode) {
            removeTyping();
            const typingWrapper = document.createElement('div');
            typingWrapper.className = 'msg-wrapper msg-nyelle';
            typingWrapper.id = 'typing-indicator';
            
            const pfpHtml = senderCode === 'NYELLE_CORE' ? 'N' : renderSidebarPfp(friendsList[senderCode]?.pfp || '🤖');
            
            typingWrapper.innerHTML = `
                <div class="bubble-pfp">${pfpHtml}</div>
                <div class="toon-bubble nyelle-msg">
                    <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            `;
            chatContent.appendChild(typingWrapper);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // ==========================================
        // SENDING MESSAGES & TYPING EVENTS
        // ==========================================
        let typingTimeout;
        inputField.addEventListener('input', () => {
            if (ws && ws.readyState === WebSocket.OPEN && activeChat !== 'NYELLE_CORE') {
                ws.send(JSON.stringify({ type: "typing", target_user: activeChat }));
            }
        });

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text || !ws) return;

            // Push through the WebSocket
            ws.send(JSON.stringify({
                type: "chat",
                target_user: activeChat,
                text: text
            }));
            
            inputField.value = '';
            
            // If talking to AI, trigger fake typing immediately since it doesn't send native WS typing events yet
            if(activeChat === 'NYELLE_CORE') showTyping('NYELLE_CORE');
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ==========================================
        // SYSTEM BOOT
        // ==========================================
        async function startSystem() {
            // Setup my profile visuals
            document.getElementById('my-sidebar-name').textContent = currentUserName;
            document.getElementById('my-sidebar-pfp').innerHTML = renderSidebarPfp(currentUserPfp);
            
            buildFriendList();

            // Fetch AI history once on boot
            try {
                const res = await fetch(`${API_URL}/history/${currentUserCode}`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
                if (res.ok) {
                    const data = await res.json();
                    if (data.history && data.history.length > 0) {
                        data.history.forEach(msg => {
                            chatHistories['NYELLE_CORE'].push({ text: msg.content, isSelf: msg.role === "User" });
                        });
                    }
                }
            } catch (err) {}

            switchChat('NYELLE_CORE');
            connectWebSocket(); // Ignite the multiplayer engine!
        }
    </script>
</body>
</html>
