<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nyelle Social</title>
    <style>
        /* =========================================
           BASE RESET & VARIABLES
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }

        :root {
            --bg-darker: #1e1f22; 
            --bg-dark: #2b2d31;   
            --bg-panel: #313338;  
            --accent: #5865F2;    
            --accent-shadow: #3b429f;
            --accent-highlight: #8ea1ff;
            --bubble-nyelle: #383a40;
            --bubble-nyelle-shadow: #1e1f22;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
            --success: #23a559;
        }

        body { background-color: var(--bg-darker); height: 100vh; display: flex; overflow: hidden; color: var(--text-main); }

        /* =========================================
           OVERLAYS
           ========================================= */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 999; 
        }
        .auth-box { background: var(--bg-dark); padding: 35px 25px; border-radius: 20px; border: 2px solid #111; box-shadow: 0px 10px 30px rgba(0,0,0,0.8); text-align: center; width: 90%; max-width: 400px; }
        .auth-box h2 { color: var(--text-main); margin-bottom: 5px; font-weight: 900; }
        .auth-box p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        
        .avatar-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .avatar-option, .custom-pfp-preview { width: 55px; height: 55px; font-size: 30px; cursor: pointer; padding: 10px; background: var(--bg-darker); border-radius: 50%; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar-option.selected, .custom-pfp-preview.selected { border-color: var(--accent); background: var(--bg-panel); box-shadow: 0px 0px 15px rgba(88, 101, 242, 0.5); }
        .custom-pfp-preview { object-fit: cover; display: none; padding: 0; }

        .upload-btn { background: #1e1f22; border: 2px dashed #4f525a; color: var(--text-muted); padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; display: inline-block; margin-bottom: 20px; }
        
        /* =========================================
           LAYOUT & SIDEBAR (FIXED UI BLOWOUT)
           ========================================= */
        .app-layout { display: flex; width: 100%; height: 100%; }
        .sidebar { display: none; width: 280px; background: var(--bg-dark); border-right: 4px solid var(--bg-darker); flex-direction: column; box-shadow: inset -4px 0px 0px rgba(0,0,0,0.2); }
        @media (min-width: 800px) { .sidebar { display: flex; } }
        
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--bg-darker); display: flex; align-items: center; gap: 15px; }
        
        /* FIXED: Added overflow:hidden and img rules to sidebar ring */
        .avatar-ring { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid var(--text-main); overflow: hidden; flex-shrink: 0; box-shadow: 0px 4px 0px var(--accent-shadow); font-weight: bold; font-size: 18px; }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px 10px; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 5px 10px; }
        
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.1s; margin-bottom: 5px; position: relative; }
        .friend-item:hover { background: var(--bg-panel); }
        .friend-item.active { background: var(--accent); color: white; }
        
        .avatar-mini { width: 35px; height: 35px; background: var(--bg-darker); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 2px solid #111; overflow: hidden; flex-shrink: 0; }
        .avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
        .status-dot { width: 10px; height: 10px; background: var(--text-muted); border-radius: 50%; margin-left: auto; border: 2px solid var(--bg-dark); }
        .status-dot.online { background: var(--success); }

        /* =========================================
           CHAT BOX
           ========================================= */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); background-image: radial-gradient(var(--bg-darker) 1px, transparent 1px); background-size: 20px 20px; position: relative; }
        .mobile-header { display: flex; padding: 15px 20px; background: var(--bg-dark); border-bottom: 4px solid var(--bg-darker); align-items: center; gap: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.4); z-index: 10; }
        @media (min-width: 800px) { .mobile-header { display: none; } }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; align-items: center; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg-dark); }
        .chat-content { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 24px; }

        .msg-wrapper { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        .msg-nyelle { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble-pfp { font-size: 20px; background: var(--bg-darker); border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 2px solid #111; overflow: hidden; flex-shrink: 0; }
        .bubble-pfp img { width: 100%; height: 100%; object-fit: cover; } 

        .toon-bubble { padding: 14px 18px; border-radius: 20px; font-weight: 600; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; box-shadow: 0px 6px 0px rgba(0,0,0,0.2); }
        .nyelle-msg { background: var(--bubble-nyelle); border: 2px solid var(--bubble-nyelle-shadow); border-bottom-left-radius: 4px; }
        .user-msg { background: var(--accent); border: 2px solid var(--accent-shadow); border-bottom-right-radius: 4px; }

        .read-receipt { font-size: 11px; color: rgba(255,255,255,0.4); position: absolute; bottom: -18px; right: 4px; font-weight: bold; }
        .read-receipt.read { color: #4facfe; }

        /* =========================================
           INPUT AREA
           ========================================= */
        .input-wrapper { padding: 15px 20px 25px 20px; background: linear-gradient(0deg, var(--bg-darker) 0%, transparent 100%); display: flex; justify-content: center; }
        .input-container { width: 100%; max-width: 800px; display: flex; gap: 12px; }
        .toon-input { flex: 1; background: var(--bg-darker); border: 3px solid #111; border-radius: 18px; padding: 0 20px; color: white; font-size: 16px; font-weight: bold; outline: none; }
        .toon-btn { background: var(--accent); color: white; border: 2px solid var(--accent-shadow); border-radius: 16px; padding: 10px 25px; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0px 6px 0px var(--accent-shadow); }
        .toon-btn:active { transform: translateY(4px); box-shadow: 0px 2px 0px var(--accent-shadow); }

        .typing-dots { display: flex; gap: 4px; align-items: center; height: 20px; padding: 0 5px; }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="auth-box">
            <h2>System Access</h2>
            <p>Enter your 10-character code.</p>
            <input type="text" id="access-code" class="toon-input" placeholder="ACCESS CODE" style="margin-bottom: 15px; padding: 15px; text-align: center; width: 100%;">
            <button id="login-btn" class="toon-btn" style="width: 100%;">AUTHENTICATE</button>
            <p id="login-error" style="color: #da373c; display: none; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="profile-overlay" class="overlay" style="display: none;">
        <div class="auth-box">
            <h2>Welcome, <span id="welcome-name" style="color: var(--accent);">User</span>!</h2>
            <p>Set your look for the network.</p>
            <div class="avatar-picker">
                <div class="avatar-option selected" onclick="selectAvatar(this, '😎')">😎</div>
                <div class="avatar-option" onclick="selectAvatar(this, '👾')">👾</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐱')">🐱</div>
                <img id="custom-preview" class="custom-pfp-preview">
            </div>
            <label for="custom-pfp-upload" class="upload-btn">📷 Upload Picture</label>
            <input type="file" id="custom-pfp-upload" accept="image/*" style="display: none;">
            <button id="finish-setup-btn" class="toon-btn" style="width: 100%;">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="add-friend-overlay" class="overlay" style="display: none;">
        <div class="auth-box">
            <h2>Add Friend</h2>
            <p>Connect via network code.</p>
            <input type="text" id="friend-code-input" class="toon-input" placeholder="CODE" style="margin-bottom: 10px; padding: 12px; text-align: center;">
            <input type="text" id="friend-name-input" class="toon-input" placeholder="NICKNAME" style="margin-bottom: 15px; padding: 12px; text-align: center;">
            <button id="start-dm-btn" class="toon-btn" style="width: 100%;">ADD TO LIST</button>
            <button onclick="document.getElementById('add-friend-overlay').style.display='none'" class="toon-btn" style="width: 100%; background: #da373c; margin-top: 10px; box-shadow: 0px 6px 0px #a1282c;">CANCEL</button>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="avatar-ring" id="my-sidebar-pfp">N</div>
                <div>
                    <h2 style="font-weight: 900; font-size: 16px;" id="my-sidebar-name">User</h2>
                    <p style="color: var(--success); font-weight: bold; font-size: 12px;">● Online</p>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="section-title">AI Core</div>
                <div class="friend-item active" id="friend-NYELLE_CORE" onclick="switchChat('NYELLE_CORE')">
                    <div class="avatar-mini" style="background: var(--accent); color: white;">N</div>
                    <span style="font-weight: bold;">Nyelle</span>
                    <div class="status-dot online"></div>
                </div>
                <div class="section-title" style="margin-top: 20px;">Direct Messages</div>
                <div id="dm-list"></div>
                <button onclick="document.getElementById('add-friend-overlay').style.display='flex'" class="toon-btn" style="width: 100%; margin-top: 20px; font-size: 12px; background: #1e1f22;">+ ADD FRIEND</button>
            </div>
        </aside>

        <main class="main-chat">
            <header class="mobile-header">
                <div class="avatar-ring" style="width: 35px; height: 35px;" id="mob-pfp">N</div>
                <h2 style="font-size: 16px;" id="mob-name">Nyelle</h2>
            </header>
            <div class="chat-container" id="chat-box">
                <div class="chat-content" id="chat-content"></div>
            </div>
            <div class="input-wrapper">
                <div class="input-container">
                    <input type="text" id="user-input" class="toon-input" placeholder="Message..." autocomplete="off">
                    <button id="send-btn" class="toon-btn">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-remote-config-compat.js"></script>

    <script>
        // ==========================================
        // STATE & CORE VARIABLES
        // ==========================================
        let API_URL = '';
        let currentUserCode = localStorage.getItem('nyelle_user_code');
        let currentUserName = localStorage.getItem('nyelle_user_name');
        let currentUserPfp = localStorage.getItem('nyelle_user_pfp');
        let ws;
        let activeChat = 'NYELLE_CORE';
        let chatHistories = { 'NYELLE_CORE': [] };
        let friendsList = JSON.parse(localStorage.getItem('nyelle_friends')) || {};

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCwwIWNcBIPmA_Iad_I07y3LD4e4M8TLxs",
            projectId: "zane-c0ce1", 
            appId: "1:466750964965:web:4f2ca5b67d2c55cd50c00c"
        };
        firebase.initializeApp(firebaseConfig);
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings.minimumFetchIntervalMillis = 0;

        // --- BOOTLOADER ---
        async function init() {
            try {
                await remoteConfig.fetchAndActivate();
                API_URL = remoteConfig.getString('nyelle_server_url');
                if (currentUserCode && currentUserName && currentUserPfp) {
                    document.getElementById('login-overlay').style.display = 'none';
                    startSystem();
                }
            } catch (err) { 
                console.error("Firebase Error", err);
                document.getElementById('login-error').textContent = "Connection Failure.";
                document.getElementById('login-error').style.display = 'block'; 
            }
        }
        init();

        // --- AUTH LOGIC ---
        document.getElementById('login-btn').onclick = async () => {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if (!code || !API_URL) return;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();
                if (data.success) {
                    currentUserCode = data.user_id; currentUserName = data.user.name;
                    localStorage.setItem('nyelle_user_code', currentUserCode);
                    localStorage.setItem('nyelle_user_name', currentUserName);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('welcome-name').textContent = currentUserName;
                    document.getElementById('profile-overlay').style.display = 'flex';
                } else {
                    document.getElementById('login-error').textContent = "Invalid Code.";
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch(e) { alert("Server connection failed."); }
        };

        function selectAvatar(el, pfp) {
            currentUserPfp = pfp;
            document.querySelectorAll('.avatar-option, .custom-pfp-preview').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        document.getElementById('custom-pfp-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentUserPfp = ev.target.result;
                const p = document.getElementById('custom-preview');
                p.src = currentUserPfp; p.style.display = 'flex'; p.classList.add('selected');
                document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('finish-setup-btn').onclick = () => {
            localStorage.setItem('nyelle_user_pfp', currentUserPfp);
            document.getElementById('profile-overlay').style.display = 'none';
            startSystem();
        };

        // ==========================================
        // WEBSOCKET ENGINE (UPDATED PROTOCOL LOGIC)
        // ==========================================
        function connectWebSocket() {
            if (!API_URL) return;
            
            // Convert https:// to wss:// and http:// to ws://
            const wsBase = API_URL.replace(/^http/, 'ws');
            const wsUrl = `${wsBase}/ws/${currentUserCode}`;
            
            console.log("WebSocket connecting to:", wsUrl);
            ws = new WebSocket(wsUrl);
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'chat') {
                    removeTyping();
                    const from = data.from_user;
                    // Fix: Route correctly to active room or friend's inbox
                    const target = (from === currentUserCode || from === 'NYELLE_CORE') ? activeChat : from;
                    
                    if (!chatHistories[target]) chatHistories[target] = [];
                    const msgId = Date.now();
                    
                    chatHistories[target].push({ id: msgId, text: data.text, isSelf: from === currentUserCode });
                    
                    if (activeChat === target) {
                        addMessageToUI(data.text, from === currentUserCode, msgId, target);
                        // Send Read Receipt back to friend
                        if (from !== currentUserCode && from !== 'NYELLE_CORE') {
                            ws.send(JSON.stringify({ type: "read", target_user: from }));
                        }
                    } else {
                        // Mark unread in sidebar
                        const friendEl = document.getElementById(`friend-${target}`);
                        if(friendEl) friendEl.style.boxShadow = "inset 4px 0px 0px var(--success)";
                    }
                } else if (data.type === 'typing' && activeChat === data.from_user) {
                    showTyping(data.from_user);
                    clearTimeout(window.tTimer);
                    window.tTimer = setTimeout(removeTyping, 3000);
                } else if (data.type === 'read_receipt' && activeChat === data.from_user) {
                    document.querySelectorAll('.read-receipt').forEach(el => { 
                        el.innerHTML = '✓✓'; 
                        el.classList.add('read'); 
                    });
                }
            };

            ws.onclose = () => {
                console.log("WS Closed. Retrying...");
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = (err) => console.error("WebSocket Error:", err);
        }

        // ==========================================
        // UI RENDERING
        // ==========================================
        function addMessageToUI(text, isSelf, msgId, chatRoom) {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${isSelf ? 'msg-user' : 'msg-nyelle'}`;
            
            const pfp = isSelf ? renderPfp(currentUserPfp) : (chatRoom === 'NYELLE_CORE' ? 'N' : renderPfp(friendsList[chatRoom]?.pfp));
            
            wrap.innerHTML = `
                <div class="bubble-pfp">${pfp}</div>
                <div class="toon-bubble ${isSelf?'user-msg':'nyelle-msg'}">
                    <p>${text}</p>
                    ${isSelf ? `<span class="read-receipt" id="r-${msgId}">✓</span>` : ''}
                </div>`;
            
            document.getElementById('chat-content').appendChild(wrap);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function renderPfp(p) { 
            if (!p) return '👤';
            return p.startsWith('data:image') ? `<img src="${p}">` : p; 
        }

        function showTyping(code) {
            removeTyping();
            const wrap = document.createElement('div');
            wrap.className = 'msg-wrapper msg-nyelle';
            wrap.id = 'typing-indicator';
            const pfp = (code === 'NYELLE_CORE') ? 'N' : renderPfp(friendsList[code]?.pfp);
            wrap.innerHTML = `<div class="bubble-pfp">${pfp}</div><div class="toon-bubble nyelle-msg"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            document.getElementById('chat-content').appendChild(wrap);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function removeTyping() { const t = document.getElementById('typing-indicator'); if (t) t.remove(); }

        function switchChat(code) {
            activeChat = code;
            document.querySelectorAll('.friend-item').forEach(i => { i.classList.remove('active'); i.style.boxShadow = "none"; });
            document.getElementById(`friend-${code}`)?.classList.add('active');
            
            document.getElementById('chat-content').innerHTML = '';
            
            const name = (code === 'NYELLE_CORE') ? 'Nyelle' : friendsList[code].name;
            const pfp = (code === 'NYELLE_CORE') ? 'N' : renderPfp(friendsList[code].pfp);
            
            document.getElementById('mob-name').textContent = name;
            document.getElementById('mob-pfp').innerHTML = pfp;
            
            // Render local history
            (chatHistories[code] || []).forEach(m => addMessageToUI(m.text, m.isSelf, m.id, code));
        }

        document.getElementById('start-dm-btn').onclick = () => {
            const code = document.getElementById('friend-code-input').value.trim().toUpperCase();
            const name = document.getElementById('friend-name-input').value.trim();
            if (!code || !name) return;
            friendsList[code] = { name, pfp: '🤖' };
            localStorage.setItem('nyelle_friends', JSON.stringify(friendsList));
            refreshFriendList();
            document.getElementById('add-friend-overlay').style.display = 'none';
            switchChat(code);
        };

        function refreshFriendList() {
            const list = document.getElementById('dm-list');
            list.innerHTML = '';
            Object.entries(friendsList).forEach(([code, info]) => {
                list.innerHTML += `
                    <div class="friend-item" id="friend-${code}" onclick="switchChat('${code}')">
                        <div class="avatar-mini">${renderPfp(info.pfp)}</div>
                        <span style="font-weight:bold;">${info.name}</span>
                        <div class="status-dot online"></div>
                    </div>`;
            });
        }

        // ==========================================
        // SYSTEM BOOT (UPDATED HISTORY ORDER)
        // ==========================================
        async function startSystem() {
            document.getElementById('my-sidebar-name').textContent = currentUserName;
            document.getElementById('my-sidebar-pfp').innerHTML = renderPfp(currentUserPfp);
            refreshFriendList();

            try {
                // 1. Fetch History FIRST
                const res = await fetch(`${API_URL}/history/${currentUserCode}`, { 
                    headers: {'ngrok-skip-browser-warning': 'true'} 
                });
                const data = await res.json();
                
                // 2. Populate memory array
                chatHistories['NYELLE_CORE'] = (data.history || []).map(m => ({ 
                    text: m.content, 
                    isSelf: m.role === 'User' 
                }));
            } catch(e) { console.error("History fetch failed", e); }
            
            // 3. Switch to AI chat room
            switchChat('NYELLE_CORE');
            
            // 4. Open the live pipe
            connectWebSocket();
        }

        // --- INPUT HANDLING ---
        const inputField = document.getElementById('user-input');
        inputField.addEventListener('input', () => {
            if (ws && ws.readyState === 1 && activeChat !== 'NYELLE_CORE') {
                ws.send(JSON.stringify({ type: "typing", target_user: activeChat }));
            }
        });

        document.getElementById('send-btn').onclick = () => {
            const text = inputField.value.trim();
            if (!text || !ws) return;
            
            ws.send(JSON.stringify({ type: 'chat', target_user: activeChat, text }));
            inputField.value = '';
            
            // Fake immediate typing for AI
            if (activeChat === 'NYELLE_CORE') showTyping('NYELLE_CORE');
        };
        
        inputField.onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('send-btn').click(); };
    </script>
</body>
</html>
